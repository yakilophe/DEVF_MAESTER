<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja de Comentarios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Caja de Comentarios</h1>
        
        <div class="form-section">
            <h2>Nuevo Comentario</h2>
            <form id="commentForm">
                <div class="form-group">
                    <label for="nameInput">Nombre (opcional):</label>
                    <input type="text" id="nameInput" placeholder="Tu nombre" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="commentInput">Comentario:</label>
                    <textarea id="commentInput" rows="3" placeholder="Escribe tu comentario..." required></textarea>
                </div>
                <button type="submit" id="submitBtn">Agregar Comentario</button>
            </form>
        </div>

        <div class="comments-section">
            <h2>Comentarios <span id="commentCount">(0)</span></h2>
            <div id="commentsList" class="comments-list">
                <div class="empty-message">No hay comentarios. Se el primero en comentar.</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
